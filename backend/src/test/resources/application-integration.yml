spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  data:
    redis:
      database: 1
minio:
  endpoint: http://127.0.0.1:1
worker:
  health-url: http://127.0.0.1:1/health
  urls: http://127.0.0.1:1
