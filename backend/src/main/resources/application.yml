spring:
  application:
    name: manga-library-backend
  flyway:
    baseline-on-migrate: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/manga_library}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: classpath:/static/,file:../frontend/dist/,file:frontend/dist/

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  externalUrl: ${MINIO_EXTERNAL_URL:}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: manga-library

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expirationMs: 86400000 # 24 hours

internal:
  api-token: ${INTERNAL_API_TOKEN:manga-library-internal-token-12345}

worker:
  health-url: ${WORKER_HEALTH_URL:http://localhost:8000/health}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  servlet:
    context-path: ${CONTEXT_PATH:/tlhub}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.manga.library: ${LOG_LEVEL:INFO}
