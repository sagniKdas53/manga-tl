# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Java Backend (Maven)
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # React Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Python Workers (pip)
  - package-ecosystem: "pip"
    directory: "/workers/unified-worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/workers/worker-ocr"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/workers/worker-panel"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/workers/worker-stubs"
    schedule:
      interval: "weekly"

  # Docker & Docker Compose
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/workers/unified-worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/workers/worker-ocr"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/workers/worker-panel"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/workers/worker-stubs"
    schedule:
      interval: "weekly"
