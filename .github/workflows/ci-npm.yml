name: CI - Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/**"
      - "frontend/public/**"
      - "frontend/index.html"
      - "frontend/vite.config.*"
      - ".github/workflows/ci-npm.yml"
  pull_request:
    paths:
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/**"
      - "frontend/public/**"
      - "frontend/index.html"
      - "frontend/vite.config.*"
      - ".github/workflows/ci-npm.yml"

jobs:
  build:
    name: Install, lint, and build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
