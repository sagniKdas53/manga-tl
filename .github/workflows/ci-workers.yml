name: CI - Python Workers

on:
  push:
    branches: ["main"]
    paths:
      - "unified-workers/**"
      - ".github/workflows/ci-workers.yml"
  pull_request:
    paths:
      - "unified-workers/**"
      - ".github/workflows/ci-workers.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Lint, test, and typecheck python worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libgomp1 tesseract-ocr

      - name: Install Python dependencies
        working-directory: unified-workers
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov black pyright

      - name: Check code formatting with Black
        working-directory: unified-workers
        run: black --check .

      - name: Run tests with pytest
        working-directory: unified-workers
        run: pytest --cov=. --cov-report=term-missing

      - name: Typecheck with Pyright
        working-directory: unified-workers
        run: pyright
