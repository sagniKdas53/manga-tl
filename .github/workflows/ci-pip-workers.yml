name: CI — pip (Python Workers)

on:
  push:
    branches: ["main"]
    paths:
      - "workers/**/requirements.txt"
      - "workers/**/Dockerfile"
      - "workers/**/*.py"
  pull_request:
    paths:
      - "workers/**/requirements.txt"
      - "workers/**/Dockerfile"
      - "workers/**/*.py"

jobs:
  install:
    name: pip install — ${{ matrix.worker }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # keep other workers running if one fails
      matrix:
        worker:
          - unified-worker
          - worker-ocr
          - worker-panel
          - worker-stubs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: workers/${{ matrix.worker }}/requirements.txt

      - name: Install dependencies
        working-directory: workers/${{ matrix.worker }}
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax-check Python files
        working-directory: workers/${{ matrix.worker }}
        run: python -m compileall -q .
