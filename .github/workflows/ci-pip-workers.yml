name: CI — pip (Python Workers)

on:
  push:
    branches: ["main"]
    paths:
      - "unified-workers/requirements.txt"
      - "unified-workers/Dockerfile"
      - "unified-workers/**/*.py"
  pull_request:
    paths:
      - "unified-workers/requirements.txt"
      - "unified-workers/Dockerfile"
      - "unified-workers/**/*.py"

jobs:
  install:
    name: pip install — unified-workers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: unified-workers/requirements.txt

      - name: Install dependencies
        working-directory: unified-workers
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax-check Python files
        working-directory: unified-workers
        run: python -m compileall -q .
