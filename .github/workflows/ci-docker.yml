name: CI — Docker (Image Builds)

on:
  push:
    branches: ["main"]
    paths:
      - "**/Dockerfile"
  pull_request:
    paths:
      - "**/Dockerfile"

jobs:
  build:
    name: docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false          # independent: let each service report its own status
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: backend/Dockerfile

          - service: worker
            context: unified-workers
            dockerfile: unified-workers/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase registry owner
        id: registry_owner
        shell: bash
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/manga-tl-${{ matrix.service }}:latest
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/manga-tl-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
