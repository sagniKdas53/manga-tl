services:
  db:
    image: postgres:15-alpine
    container_name: manga-db
    environment:
      - POSTGRES_DB=manga_library
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - manga-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: manga-redis
    ports:
      - "6379:6379"
    networks:
      - manga-net
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: manga-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - manga-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - VITE_BASE_PATH=${CONTEXT_PATH:-/tlhub}
    container_name: manga-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/manga_library
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      - CONTEXT_PATH=${CONTEXT_PATH:-/tlhub}
    depends_on:
      - db
      - redis
      - minio
    networks:
      - manga-net
    restart: unless-stopped

  worker:
    build:
      context: ./unified-worker-v2
      dockerfile: Dockerfile
    container_name: manga-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - BACKEND_CALLBACK_URL=http://backend:8080${CONTEXT_PATH:-/tlhub}/api/internal/jobs/callback
      - MODEL_PROVIDER=${MODEL_PROVIDER:-nvidia}
      - API_KEY=${API_KEY:-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}
      - PREFERRED_MODEL=${PREFERRED_MODEL:-nvidia/riva-translate-4b-instruct-v1.1}
      - LOCAL_LLM_PROVIDER=ollama
      - LOCAL_LLM_ENDPOINT=http://ollama:11434/v1/chat/completions
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma3:4b}
      - RATE_LIMIT=${RATE_LIMIT:-10}
      - DEEPL_API_KEY=${DEEPL_API_KEY:-}
    depends_on:
      - redis
      - minio
      - backend
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - manga-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: manga-ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks:
      - manga-net

  ollama-init:
    image: curlimages/curl:latest
    container_name: manga-ollama-init
    depends_on:
      - ollama
    entrypoint:
      - sh
      - -c
      - |
        until curl -s http://ollama:11434/api/tags >/dev/null; do
          echo "Waiting for Ollama..."
          sleep 5
        done

        curl -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d '{"name":"${LOCAL_LLM_MODEL:-gemma3:4b}"}'
    networks:
      - manga-net

networks:
  manga-net:
    driver: bridge

volumes:
  ollama:
