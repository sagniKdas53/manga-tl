services:
  db:
    image: postgres:15-alpine
    container_name: manga-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-manga_library}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    secrets:
      - db_password
    networks:
      - manga-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-manga_library}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: manga-db-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-manga_library}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_ON_START=TRUE
    volumes:
      - ./data/backups:/backups
    secrets:
      - db_password
    depends_on:
      - db
    networks:
      - manga-net

  redis:
    image: valkey/valkey:8-alpine
    container_name: manga-valkey
    ports:
      - "6379:6379"
    networks:
      - manga-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: manga-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio_password
    ports:
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    secrets:
      - minio_password
    networks:
      - manga-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${REGISTRY_OWNER:-sagnikdas53}/manga-tl:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - VITE_BASE_PATH=${CONTEXT_PATH:-/tlhub}
    container_name: manga-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-manga_library}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD_FILE=/run/secrets/db_password
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_EXTERNAL_URL=${MINIO_EXTERNAL_URL:-}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY_FILE=/run/secrets/minio_password
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - CONTEXT_PATH=${CONTEXT_PATH:-/tlhub}
      - INTERNAL_API_TOKEN_FILE=/run/secrets/internal_api_token
      - WORKER_HEALTH_URL=${WORKER_HEALTH_URL:-http://worker:8000/health}
      - USE_REMOTE_ML=${USE_REMOTE_ML:-false}
      - REMOTE_ML_URL=${REMOTE_ML_URL:-http://worker:8000}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - OCR_MODEL_PROVIDER=${OCR_MODEL_PROVIDER}
      - OCR_VLM_MODEL=${OCR_VLM_MODEL}
      - OCR_VLM_MODEL_LIST=${OCR_VLM_MODEL_LIST}
      - TL_MODEL_PROVIDER=${TL_MODEL_PROVIDER}
      - TL_LLM_MODEL=${TL_LLM_MODEL}
      - TL_LLM_MODEL_LIST=${TL_LLM_MODEL_LIST}
      - QA_MODEL_PROVIDER=${QA_MODEL_PROVIDER}
      - QA_LLM_MODEL=${QA_LLM_MODEL}
      - QA_VLM_MODEL=${QA_VLM_MODEL}
      - QA_LLM_MODEL_LIST=${QA_LLM_MODEL_LIST}
      - QA_VLM_MODEL_LIST=${QA_VLM_MODEL_LIST}
    depends_on:
      - db
      - redis
      - minio
    secrets:
      - db_password
      - minio_password
      - jwt_secret
      - internal_api_token
    networks:
      - manga-net
      - revProxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=revProxy-net"
      - "traefik.http.routers.manga-backend.entrypoints=web,websecure"
      - "traefik.http.routers.manga-backend.rule=Host(`${HOSTNAME}`) && PathPrefix(`${CONTEXT_PATH:-/tlhub}`)"
      - "traefik.http.services.manga-backend.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.http-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.http-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.manga-backend.middlewares=http-to-https@docker"
      - "traefik.http.routers.manga-backend.tls=true"
      - "traefik.http.routers.manga-backend.tls.certresolver=tailsolver"
      - "traefik.http.routers.manga-backend.tls.domains[0].main=${HOSTNAME}"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8080$${CONTEXT_PATH:-/tlhub}/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    image: ghcr.io/${REGISTRY_OWNER:-sagnikdas53}/manga-tl-worker:latest
    build:
      context: ./unified-workers
      dockerfile: Dockerfile
    container_name: manga-worker
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY_FILE=/run/secrets/minio_password
      - BACKEND_CALLBACK_URL=${BACKEND_CALLBACK_URL:-http://backend:8080}${CONTEXT_PATH:-/tlhub}/api/internal/jobs/callback
      - INTERNAL_API_TOKEN_FILE=/run/secrets/internal_api_token
      - OCR_MERGE_THRESHOLD=${OCR_MERGE_THRESHOLD:-1.0}
      # API Keys are loaded via DOCKER_SECRETS_JSON
      - DOCKER_SECRETS_JSON=/run/secrets/api_keys
      - OCR_MODEL_PROVIDER=${OCR_MODEL_PROVIDER}
      - OCR_VLM_MODEL=${OCR_VLM_MODEL}
      - OCR_VLM_MODEL_LIST=${OCR_VLM_MODEL_LIST}
      - TL_MODEL_PROVIDER=${TL_MODEL_PROVIDER}
      - TL_LLM_MODEL=${TL_LLM_MODEL}
      - TL_LLM_MODEL_LIST=${TL_LLM_MODEL_LIST}
      - QA_MODEL_PROVIDER=${QA_MODEL_PROVIDER}
      - QA_LLM_MODEL=${QA_LLM_MODEL}
      - QA_VLM_MODEL=${QA_VLM_MODEL}
      - QA_LLM_MODEL_LIST=${QA_LLM_MODEL_LIST}
      - QA_VLM_MODEL_LIST=${QA_VLM_MODEL_LIST}
      - RATE_LIMIT=${RATE_LIMIT:-10}
      - DISABLE_LOCAL_OCR=${DISABLE_LOCAL_OCR:-false}
      - DISABLE_DEEPL_TRANSLATE=${DISABLE_DEEPL_TRANSLATE:-false}
      - DEEPL_API_KEY=${DEEPL_API_KEY}
      - DISABLE_GOOGLE_TRANSLATE=${DISABLE_GOOGLE_TRANSLATE:-false}
      # These are the local fallbacks if cloud is not available and these are configured then use these
      # LOCAL_LLM_ENDPOINT and OLLAMA_REMOTE_URL do the same thing so just keep LOCAL_LLM_ENDPOINT
      - DISABLE_LOCAL_LLM=${DISABLE_LOCAL_LLM:-false}
      - LOCAL_LLM_PROVIDER=${LOCAL_LLM_PROVIDER:-ollama}
      - LOCAL_LLM_ENDPOINT=${LOCAL_LLM_ENDPOINT:-http://ollama:11434/v1/chat/completions}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma4:e4b}
      - LOCAL_VLM_MODEL=${LOCAL_VLM_MODEL:-qwen2.5-vl-3b-instruct}
      - QA_MODE=${QA_MODE:-auto}
      - RENDER_CACHE_DIR=/app/rendered_cache
      # Finally the remote workers, to distibute load to shouldn't this be added to the back-end
      - CONCURRENT_WORKERS=${CONCURRENT_WORKERS:-1}
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
      # Comment these out if you want to seed the models or re-download them
      # - HF_HUB_OFFLINE=1
      # - PADDLEX_OFFLINE_MODE=1
      # - PADDLE_DISABLE_TELEMETRY=1
      # Log Level
      - LOG_LEVEL=${LOG_LEVEL_WORKER:-DEBUG}
      - PADDLEOCR_DET_MODEL=${PADDLEOCR_DET_MODEL:-PP-OCRv6_medium_det}
      - PADDLEOCR_REC_MODEL=${PADDLEOCR_REC_MODEL:-PP-OCRv6_medium_rec}
      - PADDLEOCR_DEVICE=${PADDLEOCR_DEVICE:-cpu}
    depends_on:
      - redis
      - minio
      - backend
    secrets:
      - minio_password
      - internal_api_token
      - api_keys
    volumes:
      - ./data/worker/huggingface:/root/.cache/huggingface
      - ./data/worker/paddlex:/root/.paddlex
      - ./data/worker/rendered_cache:/app/rendered_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - manga-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  manga-net:
    driver: bridge
  revProxy-net:
    external: true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  minio_password:
    file: ./secrets/minio_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  internal_api_token:
    file: ./secrets/internal_api_token.txt
  api_keys:
    file: ./secrets/api_keys.json
